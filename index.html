<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Sorteio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.2rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            color: #ffd700;
        }

        /* Panel */
        .panel {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 30px;
            margin: 25px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .panel label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: #ccc;
            text-align: left;
        }

        .panel select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .panel select option { background: #302b63; color: #fff; }

        /* Upload area */
        .upload-area {
            border: 2px dashed rgba(255,215,0,0.4);
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.05);
        }

        .upload-area.loaded {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.08);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 1rem;
            color: #ccc;
        }

        .upload-text strong { color: #ffd700; }

        .file-name {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #2ecc71;
            font-weight: 600;
        }

        .upload-hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 6px;
        }

        /* Saved data banner */
        .saved-banner {
            background: rgba(46,204,113,0.12);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .saved-banner p {
            font-size: 0.9rem;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        .saved-banner .saved-count {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
        }

        /* Buttons */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover { background: rgba(255,255,255,0.25); }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-sm {
            padding: 8px 18px;
            font-size: 0.85rem;
        }

        .error-msg {
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.4);
            color: #ff6b81;
            padding: 12px 20px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
            text-align: center;
            font-size: 0.9rem;
        }

        .error-msg.active { display: block; }

        /* Main area */
        .main-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 700px;
            margin-top: 10px;
        }

        .main-area.active { display: flex; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 12px 24px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd700;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 2px;
        }

        .slot-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .slot-container.active { display: flex; }

        .slot-window {
            width: 350px;
            height: 80px;
            background: rgba(0,0,0,0.4);
            border: 3px solid #ffd700;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot-track {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: none;
        }

        .slot-track.animating {
            transition: top 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .slot-name {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
            padding: 0 10px;
        }

        .result-display {
            margin: 15px 0;
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,140,0,0.15));
            border: 2px solid #ffd700;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        .result-display.active { display: block; }

        .result-display .congrats {
            font-size: 0.9rem;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .result-display .name {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .drawn-list {
            width: 100%;
            max-width: 500px;
            margin: 15px 0 30px;
        }

        .drawn-list h3 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }

        .drawn-names {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .drawn-tag {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ccc;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .all-drawn-msg {
            text-align: center;
            padding: 20px;
            color: #ffd700;
            font-size: 1.2rem;
            display: none;
        }

        .all-drawn-msg.active { display: block; }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .hidden { display: none !important; }

        @media (max-width: 500px) {
            h1 { font-size: 1.5rem; margin-top: 20px; }
            .panel { padding: 20px; margin: 15px; }
            .slot-window { width: 280px; }
            .upload-area { padding: 30px 15px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<h1>Roleta de Sorteio</h1>

<!-- Upload Panel -->
<div class="panel" id="configPanel">

    <!-- Banner de dados salvos (aparece se ja tem nomes no navegador) -->
    <div class="saved-banner hidden" id="savedBanner">
        <p>Planilha carregada anteriormente</p>
        <div class="saved-count" id="savedCount"></div>
        <div style="margin-top:12px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" onclick="useSavedNames()">Usar estes nomes</button>
            <button class="btn btn-secondary btn-sm" onclick="clearSaved()">Carregar nova planilha</button>
        </div>
    </div>

    <!-- Upload -->
    <div id="uploadSection">
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.ods" onchange="handleFile(this.files[0])">
            <div class="upload-icon">&#128196;</div>
            <div class="upload-text">
                Arraste sua planilha aqui ou <strong>clique para selecionar</strong>
            </div>
            <div class="upload-hint">.xlsx, .xls, .csv</div>
            <div class="file-name hidden" id="fileName"></div>
        </div>

        <div id="colConfig" class="hidden">
            <label for="colSelect">Coluna com os nomes</label>
            <select id="colSelect" onchange="updatePreview()"></select>

            <div id="preview" style="text-align:left; margin-bottom:15px;">
                <p style="font-size:0.8rem; color:#888; margin-bottom:5px;">Primeiros nomes encontrados:</p>
                <div id="previewNames" style="font-size:0.9rem; color:#ccc;"></div>
            </div>

            <button class="btn btn-primary" onclick="confirmNames()">Iniciar Sorteio</button>
        </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
</div>

<!-- Main Area -->
<div class="main-area" id="mainArea">
    <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalCount">0</div>
            <div class="label">Total</div>
        </div>
        <div class="stat-card">
            <div class="number" id="remainCount">0</div>
            <div class="label">Restantes</div>
        </div>
        <div class="stat-card">
            <div class="number" id="drawnCount">0</div>
            <div class="label">Sorteados</div>
        </div>
    </div>

    <div class="slot-container active" id="slotContainer">
        <div class="slot-window">
            <div class="slot-track" id="slotTrack"></div>
        </div>
    </div>

    <div class="result-display" id="resultDisplay">
        <div class="congrats">Sorteado:</div>
        <div class="name" id="resultName"></div>
    </div>

    <div class="all-drawn-msg" id="allDrawnMsg">
        Todos os nomes foram sorteados! Clique em "Resetar" para recomecar.
    </div>

    <div class="buttons">
        <button class="btn btn-primary" id="btnSpin" onclick="spin()">Girar!</button>
        <button class="btn btn-danger" id="btnReset" onclick="resetDraw()">Resetar</button>
        <button class="btn btn-secondary" onclick="showConfig()">Nova Planilha</button>
    </div>

    <div class="drawn-list">
        <h3>Nomes ja sorteados:</h3>
        <div class="drawn-names" id="drawnNames"></div>
    </div>
</div>

<script>
    let allNames = [];
    let remaining = [];
    let drawn = [];
    let isSpinning = false;
    let sheetData = {}; // { colName: [values] }

    const COLORS = [
        '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6',
        '#1abc9c','#e67e22','#e84393','#00b894','#6c5ce7',
        '#fd79a8','#00cec9','#ff7675','#74b9ff','#a29bfe',
        '#55efc4','#fdcb6e','#fab1a0','#81ecec','#dfe6e9'
    ];

    // ==================== INIT ====================
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('roleta_names');
        if (saved) {
            try {
                const names = JSON.parse(saved);
                if (names.length > 0) {
                    document.getElementById('savedBanner').classList.remove('hidden');
                    document.getElementById('savedCount').textContent = names.length + ' nomes';
                    document.getElementById('uploadSection').classList.add('hidden');
                }
            } catch(e) {}
        }

        // Drag and drop
        const area = document.getElementById('uploadArea');
        area.addEventListener('dragover', (e) => {
            e.preventDefault();
            area.classList.add('dragover');
        });
        area.addEventListener('dragleave', () => area.classList.remove('dragover'));
        area.addEventListener('drop', (e) => {
            e.preventDefault();
            area.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
    });

    // ==================== FILE HANDLING ====================
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('active');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('active');
    }

    function handleFile(file) {
        hideError();
        if (!file) return;

        const validTypes = [
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'application/vnd.ms-excel',
            'text/csv',
            'application/vnd.oasis.opendocument.spreadsheet'
        ];

        const ext = file.name.split('.').pop().toLowerCase();
        if (!['xlsx','xls','csv','ods'].includes(ext)) {
            showError('Formato nao suportado. Use .xlsx, .xls ou .csv');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 'A', defval: '' });

                if (jsonData.length === 0) {
                    showError('A planilha esta vazia.');
                    return;
                }

                // Get all column keys
                sheetData = {};
                const allKeys = new Set();
                jsonData.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));

                allKeys.forEach(key => {
                    sheetData[key] = jsonData
                        .map(row => String(row[key] || '').trim())
                        .filter(v => v !== '');
                });

                // Update UI
                document.getElementById('uploadArea').classList.add('loaded');
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileName').classList.remove('hidden');

                // Populate column selector
                const select = document.getElementById('colSelect');
                select.innerHTML = '';
                allKeys.forEach(key => {
                    const opt = document.createElement('option');
                    opt.value = key;
                    const firstVal = sheetData[key]?.[0] || '';
                    opt.textContent = `Coluna ${key} (ex: "${firstVal}")`;
                    select.appendChild(opt);
                });

                document.getElementById('colConfig').classList.remove('hidden');
                updatePreview();

            } catch(err) {
                showError('Erro ao ler o arquivo: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function updatePreview() {
        const col = document.getElementById('colSelect').value;
        const names = sheetData[col] || [];
        const preview = names.slice(0, 5).join(', ');
        const more = names.length > 5 ? ` ... e mais ${names.length - 5}` : '';
        document.getElementById('previewNames').textContent = preview + more;
    }

    function confirmNames() {
        const col = document.getElementById('colSelect').value;
        const names = sheetData[col] || [];

        if (names.length === 0) {
            showError('Nenhum nome encontrado nessa coluna.');
            return;
        }

        allNames = names;
        remaining = [...allNames];
        drawn = [];

        // Salvar no navegador
        localStorage.setItem('roleta_names', JSON.stringify(allNames));

        startRoulette();
    }

    function useSavedNames() {
        const saved = localStorage.getItem('roleta_names');
        if (saved) {
            allNames = JSON.parse(saved);
            remaining = [...allNames];
            drawn = [];
            startRoulette();
        }
    }

    function clearSaved() {
        localStorage.removeItem('roleta_names');
        document.getElementById('savedBanner').classList.add('hidden');
        document.getElementById('uploadSection').classList.remove('hidden');
    }

    function startRoulette() {
        document.getElementById('configPanel').classList.add('hidden');
        document.getElementById('mainArea').classList.add('active');
        updateStats();
        buildSlot();
    }

    function showConfig() {
        document.getElementById('mainArea').classList.remove('active');
        document.getElementById('configPanel').classList.remove('hidden');

        // Reset upload UI
        document.getElementById('uploadArea').classList.remove('loaded');
        document.getElementById('fileName').classList.add('hidden');
        document.getElementById('colConfig').classList.add('hidden');
        document.getElementById('fileInput').value = '';
        sheetData = {};

        // Show saved banner if names exist
        const saved = localStorage.getItem('roleta_names');
        if (saved) {
            const names = JSON.parse(saved);
            document.getElementById('savedBanner').classList.remove('hidden');
            document.getElementById('savedCount').textContent = names.length + ' nomes';
            document.getElementById('uploadSection').classList.add('hidden');
        } else {
            document.getElementById('savedBanner').classList.add('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
        }

        allNames = [];
        remaining = [];
        drawn = [];
        document.getElementById('drawnNames').innerHTML = '';
    }

    // ==================== ROULETTE ====================
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function updateStats() {
        document.getElementById('totalCount').textContent = allNames.length;
        document.getElementById('remainCount').textContent = remaining.length;
        document.getElementById('drawnCount').textContent = drawn.length;
    }

    function buildSlot() {
        const track = document.getElementById('slotTrack');
        if (remaining.length > 0) {
            track.innerHTML = `<div class="slot-name">${escapeHtml(remaining[0])}</div>`;
            track.style.top = '0px';
        }
    }

    function spin() {
        if (isSpinning || remaining.length === 0) return;

        isSpinning = true;
        document.getElementById('btnSpin').disabled = true;
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('allDrawnMsg').classList.remove('active');

        const winnerIdx = Math.floor(Math.random() * remaining.length);
        const winner = remaining[winnerIdx];

        const track = document.getElementById('slotTrack');
        const itemHeight = 80;
        const totalItems = 30 + Math.floor(Math.random() * 15);

        let html = '';
        for (let i = 0; i < totalItems - 1; i++) {
            const name = allNames[Math.floor(Math.random() * allNames.length)];
            html += `<div class="slot-name">${escapeHtml(name)}</div>`;
        }
        html += `<div class="slot-name">${escapeHtml(winner)}</div>`;

        track.innerHTML = html;
        track.style.top = '0px';
        track.classList.remove('animating');
        void track.offsetHeight;

        requestAnimationFrame(() => {
            track.classList.add('animating');
            track.style.top = -((totalItems - 1) * itemHeight) + 'px';
        });

        setTimeout(() => {
            remaining.splice(winnerIdx, 1);
            drawn.push(winner);

            document.getElementById('resultName').textContent = winner;
            document.getElementById('resultDisplay').classList.add('active');

            const tag = document.createElement('span');
            tag.className = 'drawn-tag';
            tag.textContent = winner;
            document.getElementById('drawnNames').appendChild(tag);

            updateStats();
            launchConfetti();

            isSpinning = false;
            document.getElementById('btnSpin').disabled = false;

            if (remaining.length === 0) {
                document.getElementById('allDrawnMsg').classList.add('active');
                document.getElementById('btnSpin').disabled = true;
            }

            track.classList.remove('animating');
        }, 3200);
    }

    function resetDraw() {
        remaining = [...allNames];
        drawn = [];
        isSpinning = false;

        document.getElementById('drawnNames').innerHTML = '';
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('allDrawnMsg').classList.remove('active');
        document.getElementById('btnSpin').disabled = false;

        updateStats();
        buildSlot();
    }

    // ==================== CONFETTI ====================
    function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const pieces = [];
        for (let i = 0; i < 120; i++) {
            pieces.push({
                x: canvas.width / 2 + (Math.random() - 0.5) * 200,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 15,
                vy: -(Math.random() * 12 + 4),
                w: Math.random() * 10 + 5,
                h: Math.random() * 6 + 3,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 15,
                gravity: 0.25 + Math.random() * 0.15,
                opacity: 1
            });
        }

        let frame = 0;
        const maxFrames = 150;

        function animate() {
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (frame > maxFrames) return;

            for (const p of pieces) {
                p.x += p.vx;
                p.vy += p.gravity;
                p.y += p.vy;
                p.rotation += p.rotSpeed;
                p.vx *= 0.99;
                if (frame > maxFrames - 30) p.opacity = Math.max(0, p.opacity - 0.035);

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        animate();
    }

    window.addEventListener('resize', () => {
        const canvas = document.getElementById('confetti-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
